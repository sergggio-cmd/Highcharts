<!DOCTYPE html>
<html>
<head>
    <title>Test Chart</title>
    <script src="highcharts.js"></script>
</head>
<body>
    <h1>Testing Highcharts</h1>
    <div id="container" style="width: 600px; height: 400px; border: 1px solid red;"></div>

    <script>
        console.log('Script running...');
        console.log('Highcharts loaded:', typeof Highcharts);

        Highcharts.chart('container', {
            chart: {
                type: 'column'
            },
            title: {
                text: 'Test Chart'
            },
            xAxis: {
                categories: ['A', 'B', 'C']
            },
            yAxis: {
                title: {
                    text: 'Values'
                }
            },
            series: [{
                name: 'Series 1',
                data: [1, 3, 2],
                color: '#1067f4'
            }]
        });

        console.log('Chart created');
    </script>
</body>
</html>
